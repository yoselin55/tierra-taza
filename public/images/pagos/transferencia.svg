<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#3B0764"/>
    </linearGradient>
  </defs>

  <!-- Fondo indigo -->
  <rect width="200" height="200" rx="38" fill="url(#bg)"/>

  <!-- Edificio banco izquierdo (origen) -->
  <!-- Techo -->
  <polygon points="42,68 72,52 102,68" fill="rgba(255,255,255,0.9)"/>
  <!-- Base -->
  <rect x="42" y="118" width="60" height="8" rx="3" fill="rgba(255,255,255,0.9)"/>
  <!-- Columnas -->
  <rect x="49" y="68" width="10" height="50" rx="2" fill="rgba(255,255,255,0.85)"/>
  <rect x="66" y="68" width="10" height="50" rx="2" fill="rgba(255,255,255,0.85)"/>
  <rect x="83" y="68" width="10" height="50" rx="2" fill="rgba(255,255,255,0.85)"/>

  <!-- Flecha de transferencia de izquierda a derecha -->
  <line x1="108" y1="93" x2="148" y2="93"
        stroke="rgba(255,255,255,0.75)" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="6 4"/>
  <polygon points="145,83 158,93 145,103" fill="rgba(255,255,255,0.85)"/>

  <!-- Símbolo de dinero / moneda en destino -->
  <circle cx="169" cy="93" r="22"
          fill="rgba(255,255,255,0.15)"
          stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
  <text x="169" y="101"
        font-family="Arial Black, sans-serif"
        font-size="20" font-weight="900"
        fill="white" text-anchor="middle">S/</text>

  <!-- Texto "Transferencia" pequeño abajo -->
  <text x="100" y="155"
        font-family="Arial, Helvetica, sans-serif"
        font-size="13" font-weight="700"
        fill="rgba(255,255,255,0.6)" text-anchor="middle"
        letter-spacing="0.5">TRANSFERENCIA</text>
</svg>
