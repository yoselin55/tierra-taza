<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="eg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#065F32"/>
    </linearGradient>
    <linearGradient id="bill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
  </defs>

  <!-- Fondo verde -->
  <rect width="200" height="200" rx="38" fill="url(#eg)"/>

  <!-- Billete trasero (ligeramente rotado) -->
  <g transform="rotate(-8, 100, 100)">
    <rect x="22" y="62" width="136" height="82" rx="8"
          fill="url(#bill)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <circle cx="90" cy="103" r="22" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <circle cx="90" cy="103" r="15" fill="rgba(0,0,0,0.1)"/>
  </g>

  <!-- Billete frontal -->
  <rect x="28" y="70" width="144" height="86" rx="8"
        fill="#186A31" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

  <!-- Ornamento esquinas del billete -->
  <circle cx="48"  cy="90"  r="9"  fill="rgba(255,255,255,0.12)"/>
  <circle cx="152" cy="90"  r="9"  fill="rgba(255,255,255,0.12)"/>
  <circle cx="48"  cy="136" r="9"  fill="rgba(255,255,255,0.12)"/>
  <circle cx="152" cy="136" r="9"  fill="rgba(255,255,255,0.12)"/>

  <!-- Medallón central -->
  <circle cx="100" cy="113" r="26" fill="rgba(255,255,255,0.1)"
          stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- Símbolo S/ grande -->
  <text x="100" y="123"
        font-family="Arial Black, Helvetica, sans-serif"
        font-size="30" font-weight="900"
        fill="white" text-anchor="middle">S/</text>
</svg>
