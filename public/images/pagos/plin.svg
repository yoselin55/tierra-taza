<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="pg" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#00E5C8"/>
      <stop offset="60%" stop-color="#00C8B0"/>
      <stop offset="100%" stop-color="#0068F0"/>
    </linearGradient>
  </defs>

  <!-- Blob orgánico estilo Plin (forma irregular de burbuja/gota) -->
  <path d="
    M 100 8
    C 148 8, 186 44, 186 92
    C 186 138, 152 172, 106 178
    C 88  182, 68  176, 52  166
    C 30  152, 16  128, 16  92
    C 16  44,  54  8,  100 8 Z
  " fill="url(#pg)"/>

  <!-- Cola inferior izquierda del blob (característica del logo Plin) -->
  <path d="
    M 52 166
    C 42 174, 28 185, 12 196
    C 26 183, 34 170, 52 166 Z
  " fill="url(#pg)"/>

  <!-- Texto "plin" en blanco, bold redondeado -->
  <!-- Usamos tspan para posicionar el punto rosa de la i -->
  <text font-family="Arial Rounded MT Bold, Arial, Helvetica, sans-serif"
        font-size="60" font-weight="900" fill="white" text-anchor="middle">
    <tspan x="100" y="122">plin</tspan>
  </text>

  <!-- Punto rosa sobre la "i" en "plin"
       La i es el tercer carácter. Con font-size=60, char-width≈33px cada uno.
       "pli" = ~99px, i-center ≈ 100 - 60/2 + 33*2.5 = 40 + 82.5 = 122.5 → ajustado visualmente -->
  <circle cx="138" cy="68" r="9" fill="#FF3FBF"/>
</svg>
