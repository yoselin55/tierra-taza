<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="yg" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#A020C8"/>
      <stop offset="100%" stop-color="#6B0BA0"/>
    </linearGradient>
  </defs>

  <!-- Fondo morado redondeado -->
  <rect width="200" height="200" rx="38" fill="url(#yg)"/>

  <!-- Burbuja de chat turquesa (círculo + punta triangular abajo) -->
  <circle cx="100" cy="62" r="34" fill="#00CEB0"/>
  <polygon points="92,90 108,90 100,105" fill="#00CEB0"/>

  <!-- S/ dentro de la burbuja -->
  <text x="100" y="75"
        font-family="Arial Black, Helvetica, sans-serif"
        font-size="26" font-weight="900"
        fill="#7B0DA0" text-anchor="middle">S/</text>

  <!-- "yape" en blanco, fuente cursiva -->
  <text x="100" y="162"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="52" font-weight="700" font-style="italic"
        fill="white" text-anchor="middle">yape</text>

  <!-- Línea decorativa bajo el texto (reflejo de la marca) -->
  <line x1="42" y1="172" x2="158" y2="172"
        stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
</svg>
